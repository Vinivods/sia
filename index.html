<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <!-- <link rel="stylesheet" href="static/css/style.css"> -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> -->
    <link rel="stylesheet" href="style.css">
    
  </head>
  <body class="container d-flex flex-column justify-content-center align-items-center">
      <div class="container d-flex justify-content-center px-5 pt-5 w-75">
            <div class="col-md-7 d-flex flex-column align-items-center">
                <label for="cnpj" class="form-label labels">CNJP</label>
                <input type="text" id="cnpj" class="form-control w-75" required>
            </div>
            <button type="button" id="btnConsultar" class="btn btn-primary h-50 align-self-end">Consultar</button>
        </div>

    <form class="row g-1 container border-1 p-5 w-75">
        <h3 class="fw-bold">Dados de Cadastro</h3>
        <h5>Identificação</h5>
        <div class="col-md-5">
            <label for="razao_social" class="form-label labels">RAZÃO SOCIAL</label>
            <input type="text" class="form-control form-control-sm" id="razao_social" required>
        </div>
        <div class="col-md-5">
            <label for="nome_empresa" class="form-label labels">NOME DA EMPRESA</label>
            <input type="text" class="form-control form-control-sm" id="nome_empresa" required>
        </div>
        <div class="col-md-2">
            <label for="sigla" class="form-label labels">SIGLA</label>
            <input type="text" class="form-control form-control-sm" id="sigla" required>
        </div>

        <h5 class="mt-4">Enquadramento Empresarial</h5>
        <div class="d-flex justify-content-start" aria-required="true">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                <label class="form-check-label fs-label" for="inlineRadio1">(ME) Microempresa</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
                <label class="form-check-label fs-label" for="inlineRadio2">(EPP) Empresa de Pequeno Porte</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3" value="option3">
                <label class="form-check-label fs-label" for="inlineRadio3">(GP) Grande Porte</label>
            </div>
        </div>
        
        <h5 class="mt-4">Contato geral</h5>
        <div class="col-md-5">
            <label for="email" class="form-label labels">EMAIL EMPRESA</label>
            <input type="email" class="form-control form-control-sm text-lowercase" id="email">
        </div>
        <div class="col-md-5">
            <label for="email_empresa_notificacao" class="form-label labels">EMAIL PARA NOTIFICAÇÕES</label>
            <input type="email" class="form-control form-control-sm" id="email_empresa_notificacao">
        </div>
        <div class="col-md-2">
            <label for="telefone" class="form-label labels">TELEFONE</label>
            <input type="tel" class="form-control form-control-sm" id="telefone">
        </div>

        <h5 class="mt-4">Endereço Sede</h5>    
        <div class="col-md-2">
            <label for="cep" class="form-label labels">CEP</label>
            <input type="number" class="form-control form-control-sm" id="cep" required>
        </div>
        <div class="col-md-8">
            <label for="logradouro" class="form-label labels">LOGRADOURO</label>
            <input type="text" class="form-control form-control-sm text-capitalize" id="logradouro" required>
        </div>
        <div class="col-md-2">
            <label for="numero" class="form-label labels">NÚMERO</label>
            <input type="number" class="form-control form-control-sm" id="numero">
        </div>
        <div class="col-md-7">
            <label for="complemento" class="form-label labels">COMPLEMENTO</label>
            <input type="text" class="form-control form-control-sm text-lowercase" id="complemento">
        </div>
        <div class="col-md-3">
            <label for="cidade" class="form-label labels">CIDADE</label>
            <input type="text" class="form-control form-control-sm" id="cidade" required>
        </div>
        <div class="col-md-2">
            <label for="uf" class="form-label labels">UF</label>
            <input type="text" class="form-control form-control-sm" id="uf" required>
        </div>

        <h5 class="mt-4">Contato Interno</h5>
        <div class="col-md-6">
            <label for="contato_interno" class="form-label labels">CONTATO INTERNO</label>
            <input type="text" class="form-control form-control-sm" id="contato_interno">
        </div>
        <div class="col-md-6">
            <label for="email_contato_interno" class="form-label labels">EMAIL CONTATO INTERNO</label>
            <input type="text" class="form-control form-control-sm" id="email_contato_interno">
        </div>
        <hr class="my-5">

        <h3 class="fw-bold">Dados Regulatórios</h3>
        <h5>Grupo Regulatório</h5>
        <div class="col-md-6">
            <label for="grupo_regulatorio" class="form-label labels">GRUPO</label>
            <select id="grupo_regulatorio" class="form-select form-control-sm fs12">
                <option selected></option>
                <option>RMSG</option>
                <option>BRK</option>
                <option>CORSAN</option>
                <option>Hidroviário</option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="daer" class="form-label labels">DAER</label>
            <input type="text" class="form-control form-control-sm" id="daer">
        </div>
        <div class="col-md-2">
            <label for="metroplan1" class="form-label labels">METROPLAN-1</label>
            <input type="text" class="form-control form-control-sm" id="metroplan1">
        </div>
        <div class="col-md-2">
            <label for="metroplan2" class="form-label labels">METROPLAN-2</label>
            <input type="text" class="form-control form-control-sm" id="metroplan2">
        </div>

        <h5 class="mt-4">Área Regulada</h5>
        <table id="tabelaAreas">
            <thead>
                <tr>
                    <th>Área regulada</th>
                    <th>Código NFI</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <button class="btn-add" onclick="adicionarLinha()">+ Adicionar Nova Área</button>

        <hr class="my-5">

        <h3 class="fw-bold">Dados Contábeis e para Cobrança</h3>
        <h5>Endereço Cobrança</h5>    
        <div class="col-md-2">
            <label for="cep_cobrança" class="form-label labels">CEP COBRANÇA</label>
            <input type="number" class="form-control form-control-sm" id="cep_cobrança">
        </div>
        <div class="col-md-8">
            <label for="logradouro_cobrança" class="form-label labels">LOGRADOURO COBRANÇA</label>
            <input type="text" class="form-control form-control-sm" id="logradouro_cobrança">
        </div>
        <div class="col-md-2">
            <label for="numero_cobrança" class="form-label labels">NÚMERO COBRANÇA</label>
            <input type="number" class="form-control form-control-sm" id="numero_cobrança">
        </div>
        <div class="col-md-7">
            <label for="complemento_cobrança" class="form-label labels">COMPLEMENTO COBRANÇA</label>
            <input type="text" class="form-control form-control-sm" id="complemento_cobrança">
        </div>
        <div class="col-md-3">
            <label for="cidade_cobrança" class="form-label labels">CIDADE COBRANÇA</label>
            <input type="text" class="form-control form-control-sm" id="cidade_cobrança">
        </div>
        <div class="col-md-2">
            <label for="uf_cobrança" class="form-label labels">UF COBRANÇA</label>
            <input type="text" class="form-control form-control-sm" id="uf_cobrança">
        </div>

        <h5 class="mt-4">Administrador Responsável</h5>
        <div class="col-md-8">
            <label for="nome_administrador" class="form-label labels">NOME ADMINISTRADOR</label>
            <input type="text" class="form-control form-control-sm" id="nome_administrador" required>
        </div>
        <div class="col-md-4">
            <label for="cpf_administrador" class="form-label labels">CPF ADMINISTRADOR</label>
            <input type="text" class="form-control form-control-sm" id="cpf_administrador" required>
        </div>
        <div class="col-md-8">
            <label for="email_administrador" class="form-label labels">EMAIL ADMINISTRADOR</label>
            <input type="email" class="form-control form-control-sm" id="email_administrador" required>
        </div>
        <div class="col-md-4">
            <label for="tel_administrador" class="form-label labels">TELEFONE ADMINISTRADOR</label>
            <input type="number" class="form-control form-control-sm" id="tel_administrador" required>
        </div>

        <h5 class="mt-4">Contador</h5>
        <div class="col-md-8">
            <label for="nome_administrador" class="form-label labels">NOME CONTADOR</label>
            <input type="text" class="form-control form-control-sm" id="nome_contador" required>
        </div>
        <div class="col-md-2">
            <label for="cpf_contador" class="form-label labels">CPF CONTADOR</label>
            <input type="text" class="form-control form-control-sm" id="cpf_contador" required>
        </div>
        <div class="col-md-2">
            <label for="cpf_contador" class="form-label labels">CRC CONTADOR</label>
            <input type="text" class="form-control form-control-sm" id="cpf_contador" required>
        </div>
        <div class="col-md-8">
            <label for="email_contador" class="form-label labels">EMAIL CONTADOR</label>
            <input type="email" class="form-control form-control-sm" id="email_contador" required>
        </div>
        <div class="col-md-4">
            <label for="tel_contador" class="form-label labels">TELEFONE CONTADOR</label>
            <input type="number" class="form-control form-control-sm" id="tel_contador" required>
        </div>

        <h5 class="mt-4">Outros</h5>
        <div class="col-md-10">
            <label for="obs_status" class="form-label labels">OBSERVAÇÃO DE STATUS</label>
            <textarea type="text" class="form-control" id="obs_status"></textarea>
        </div>
        <div class="col-md-2">
            <label for="status" class="form-label labels">STATUS</label>
            <select id="status" class="form-select form-control-sm fs12" required>
                <option selected></option>
                <option>Status 1</option>
                <option>Status 2</option>
            </select>
        </div>
        <button class="btn btn-primary col-md-2 mt-4" type="submit">Enviar</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="scripts.js"></script>
  </body>
</html>
